name: GitHub Classroom Workflow
on: [push]
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  build:
    name: Autograding
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Compilation Test
        id: compile
        uses: education/autograding-command-grader@v1
        with:
          test-name: Compilation Test
          setup-command: ""
          command: pio run
          timeout: 10
          max-score: 40

      - name: Logic Check - drive() Function
        id: drive_check
        uses: education/autograding-command-grader@v1
        with:
          test-name: Logic Check - drive() Function
          setup-command: ""
          command: grep -q "void drive(int speed)" src/main.cpp && grep -q "constrain" src/main.cpp
          timeout: 5
          max-score: 30

      - name: Documentation Check - Truth Table
        id: doc_check
        uses: education/autograding-command-grader@v1
        with:
          test-name: Documentation Check - Truth Table
          setup-command: ""
          command: test -s docs/TruthTable.md
          timeout: 5
          max-score: 30

      - name: Autograding Reporter
        uses: education/autograding-grading-reporter@v1
        env:
          COMPILE_RESULTS: "${{steps.compile.outputs.result}}"
          DRIVE_CHECK_RESULTS: "${{steps.drive_check.outputs.result}}"
          DOC_CHECK_RESULTS: "${{steps.doc_check.outputs.result}}"
        with:
          runners: "compile,drive_check,doc_check"
